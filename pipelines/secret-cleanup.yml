# ================================================================
# secret-cleanup.yml
# Pipeline  : Azure AD Secrets Cleanup - IaC + Automation Deploy
# Trigger   : Manual only
# Agent     : Self-hosted (Srini_Machine)
# Stages    : Validate -> DeployInfra -> Verify
# Variables : See pipelines/variables/
# ================================================================

trigger: none

# ── Variable Group (sensitive values) ─────────────────────────
# tenant group contains:
# - MANAGED_IDENTITY_CLIENT_ID (secret)
variables:
- group: tenant
- template: variables/common.yml
- template: variables/infra.yml

pool:
  name: $(AGENT_POOL)

stages:

# ── Stage 1: Validate ─────────────────────────────────────────
- stage: Validate
  displayName: Validate
  jobs:
    - job: UnitTests
      displayName: Run Unit Tests
      steps:
        - checkout: self

        - task: PowerShell@2
          displayName: Install Dependencies
          inputs:
            pwsh: false
            targetType: filePath
            filePath: '$(INSTALL_SCRIPT)'

        - task: PowerShell@2
          displayName: Run Pester Unit Tests
          inputs:
            pwsh: false
            targetType: filePath
            filePath: 'scripts/Invoke-Tests.ps1'

        - task: PublishTestResults@2
          displayName: Publish Test Results
          condition: always()
          inputs:
            testResultsFormat: NUnit
            testResultsFiles: '**/test-results.xml'
            searchFolder: '$(System.DefaultWorkingDirectory)'

# ── Stage 2: Deploy Infrastructure ────────────────────────────
- stage: DeployInfra
  displayName: Deploy Infrastructure
  dependsOn: Validate
  condition: succeeded()
  jobs:
    - job: BicepDeploy
      displayName: Deploy Bicep IaC
      steps:
        - checkout: self

        - task: AzureCLI@2
          displayName: Deploy Bicep and Upload Runbook
          inputs:
            azureSubscription: '$(SERVICE_CONNECTION)'
            scriptType: ps
            scriptLocation: scriptPath
            scriptPath: '$(DEPLOY_SCRIPT)'
            addSpnToEnvironment: true

# ── Stage 3: Verify ───────────────────────────────────────────
- stage: Verify
  displayName: Verify Deployment
  dependsOn: DeployInfra
  condition: succeeded()
  jobs:
    - job: VerifyResources
      displayName: Verify Azure Resources
      steps:
        - checkout: self

        - task: AzureCLI@2
          displayName: Verify Automation Resources
          inputs:
            azureSubscription: '$(SERVICE_CONNECTION)'
            scriptType: ps
            scriptLocation: scriptPath
            scriptPath: '$(VERIFY_SCRIPT)'
            addSpnToEnvironment: true
